[databases]
; Route all comics_gcd connections to the internal Postgres container.
; No sslmode here — server-side TLS is disabled (internal Docker network).
comics_gcd = host=postgres port=5432 dbname=comics_gcd

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432

; ── Auth ──────────────────────────────────────────────────────────────────────
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

; ── Client TLS ────────────────────────────────────────────────────────────────
; Require TLS for all connections on port 6432 (this port is public).
; Certs are mounted from ./pgbouncer/tls/ on the host.
; See ops/droplet-bootstrap.md for cert generation steps.
client_tls_sslmode = require
client_tls_cert_file = /etc/pgbouncer/tls/server.crt
client_tls_key_file  = /etc/pgbouncer/tls/server.key

; ── Server TLS ────────────────────────────────────────────────────────────────
; Postgres is on the internal Docker bridge — no TLS needed.
server_tls_sslmode = disable

; ── Pool settings ─────────────────────────────────────────────────────────────
; IMPORTANT: transaction mode is incompatible with named prepared statements.
; The API connects directly to Postgres (not through PgBouncer), so this does
; not affect the API. Future Vercel clients must use ?pgbouncer=true in the
; connection string to disable named prepared statements on the client side.
pool_mode = transaction
max_client_conn = 200
default_pool_size = 20
min_pool_size = 2
reserve_pool_size = 5
reserve_pool_timeout = 3

; ── Logging ───────────────────────────────────────────────────────────────────
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
