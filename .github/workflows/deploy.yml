name: Deploy

# Runs after the CI workflow completes successfully on main.
# The deploy key on the droplet is restricted to a single command:
#   cd /opt/stack && git pull && docker compose -f ops/compose/docker-compose.yml up -d --build api
# Any attempt to run anything else with that key is rejected by sshd.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy to droplet
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Deploy via restricted SSH key
        run: |
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key \
              -o StrictHostKeyChecking=no \
              -o BatchMode=yes \
              ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }}
          rm -f /tmp/deploy_key

      - name: Smoke-test /health
        run: |
          sleep 10
          curl --fail --silent --show-error \
            --retry 5 --retry-delay 5 --retry-connrefused \
            https://api.dcdecade.com/health | grep -q '"status":"ok"'
          echo "Health check passed."
