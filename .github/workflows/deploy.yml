name: Deploy

# Runs after the CI workflow completes successfully on main.
# Connects to the droplet with a passwordless ed25519 deploy key (DEPLOY_SSH_KEY),
# pulls main into /home/rod/stack, and rebuilds the api container.
# The .env at /home/rod/ops/compose/.env is symlinked into ops/compose/.env in the
# checkout, so credentials live outside the git tree.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

# Prevent concurrent deploys — if two pushes land quickly, queue rather than race.
concurrency:
  group: deploy-droplet
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to droplet
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Write deploy key
        run: |
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Pin droplet host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.DROPLET_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via restricted SSH key
        run: |
          ssh -i /tmp/deploy_key \
              -o BatchMode=yes \
              ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }} \
              "cd /home/rod/stack && git pull && docker compose -f ops/compose/docker-compose.yml up -d --build api"

      - name: Remove deploy key
        if: always()
        run: rm -f /tmp/deploy_key

      - name: Smoke-test /health
        run: |
          sleep 10
          curl --fail --silent --show-error \
            --retry 5 --retry-delay 5 --retry-connrefused \
            https://api.dcdecade.com/health | grep -q '"status":"ok"'
          echo "Health check passed."
